<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-container">
    <div class="header-section">
      <ion-back-button defaultHref="/login" slot="start"></ion-back-button>
      <h1>Atur Ulang</h1>
      <p>{{ step === 'find' ? 'Temukan akun Anda' : 'Buat password baru' }}</p>
    </div>

    <div class="form-section">
      <!-- Step 1: Find Account -->
      <div *ngIf="step === 'find'">
        <div class="input-group">
          <ion-label>Username</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="at-outline" slot="start"></ion-icon>
            <ion-input type="text" [(ngModel)]="username" placeholder="Masukkan username Anda"></ion-input>
          </ion-item>
        </div>

        <ion-button expand="block" class="auth-btn" (click)='onFindAccount()'>
          LANJUTKAN
        </ion-button>
      </div>

      <!-- Step 2: Reset Password -->
      <div *ngIf="step === 'reset'">
        <div class="input-group">
          <ion-label>Password Baru</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input type="password" [(ngModel)]="newPassword" placeholder="Password baru"></ion-input>
          </ion-item>
          <p class="error-text" *ngIf="newPassword && newPassword.length < 6">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Password minimal 6 angka/karakter
          </p>
        </div>

        <div class="input-group">
          <ion-label>Konfirmasi Password</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
            <ion-input type="password" [(ngModel)]="confirmPassword" placeholder="Ulangi password baru"></ion-input>
          </ion-item>
        </div>

        <ion-button expand="block" class="auth-btn" (click)="onResetPassword()">
          PERBARUI PASSWORD
        </ion-button>
      </div>

      <p class="footer-text">
        Ingat password? <span class="link" (click)="goToLogin()">Kembali ke Login</span>
      </p>
    </div>
  </div>
</ion-content>
