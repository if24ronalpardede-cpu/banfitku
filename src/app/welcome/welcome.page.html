<ion-content [fullscreen]="true" class="welcome-content">
  <div class="welcome-wrapper">
    <!-- Glow Effect Background -->
    <div class="glow-accent"></div>

    <div class="content-body">
      <div class="logo-container">
        <ion-icon name="disc-outline"></ion-icon>
      </div>

      <div class="text-container">
        <h1 class="app-title">BanFit</h1>
        <p class="tagline">SMART TIRE SOLUTION</p>
        <p class="description">
          Kelola jadwal perawatan dan temukan ban terbaik untuk kenyamanan berkendara Anda.
        </p>
      </div>

      <div class="footer-container">
        <ion-button (click)="startApp()" expand="block" class="start-btn">
          MULAI SEKARANG
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
